name: ci workflow
on:
    push:
jobs:
    build-and-push: # it a name of the job
        runs-on: ubuntu-latest #gitlab-runner-free
        steps:
            - uses: actions/checkout@v4 #clone the code into ubuntu server
            - uses: docker/setup-buildx-action@v4 #build an app via docker
            - uses: docker/login-action@v4 #login to dockerhub
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}  # authtication for docker hub
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - uses: docker/build-push-action@v7 #push docker image to docker hub
              with: 
                context: ./backend
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:first_three_tier_deploy
                
            

